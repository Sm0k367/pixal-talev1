name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check-and-lint:
    name: TypeScript Type-Check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type-check
        run: npm run type-check

      - name: Check for lint issues (tsc strict check)
        run: npm run type-check -- --strict 2>/dev/null || echo "Strict mode warnings noted"
