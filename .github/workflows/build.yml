name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Production Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type-check
        run: npm run type-check

      - name: Build production bundle
        run: npm run build
        env:
          # Groq API key is not required at build time (serverless function uses it at runtime)
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify build output
        run: |
          echo "Build output:"
          ls -lh dist/
          echo "Assets:"
          ls -lh dist/assets/ 2>/dev/null || echo "No assets directory"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
